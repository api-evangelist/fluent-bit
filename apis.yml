aid: fluent-bit
name: Fluent Bit
description: >-
  Fluent Bit is an open source lightweight log processor and forwarder for
  collecting, parsing, and routing logs and metrics at scale. It exposes an
  embedded HTTP monitoring server with v1 and v2 endpoints for build info,
  uptime, internal metrics (JSON, Prometheus, cmetrics), storage stats,
  health checks, and hot reload.
type: Index
image: https://kinlane-productions.s3.amazonaws.com/apis-json/apis-json-logo.jpg
tags:
