apis:
  - aid: fluent-bit:fluent-bit-monitoring-http-api
    name: Fluent Bit Monitoring HTTP API
    description: >-
      Fluent Bit's embedded HTTP server (default port 2020) exposes endpoints
      for build information, uptime, internal plugin metrics in JSON,
      Prometheus, and cmetrics formats, storage layer statistics, health
      checks, and hot reload.
    humanURL: https://docs.fluentbit.io/manual/administration/monitoring
    baseURL: http://127.0.0.1:2020
